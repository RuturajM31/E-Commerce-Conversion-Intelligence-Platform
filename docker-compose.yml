services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_streamlit_app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
      - ./models:/app/models:ro
      - ./monitoring:/app/monitoring:rw
      - ./outputs:/app/outputs:rw
      - ./logs:/app/logs:rw
    restart: unless-stopped

  metrics-exporter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_metrics_exporter
    command: ["python", "-m", "src.monitoring.metrics_exporter"]
    environment:
      - PROJECT_ROOT=/app
      - METRICS_EXPORTER_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./monitoring/metrics_cache:/app/monitoring/metrics_cache:ro
    depends_on:
      - streamlit-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ecommerce_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager
      - blackbox-exporter
      - streamlit-app
      - metrics-exporter
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: ecommerce_blackbox_exporter
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ecommerce_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: ecommerce_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=Techno#123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
