# =============================================================================
# Blackbox Exporter ConfigMap + Deployment + Service
# =============================================================================
#
# What this file does:
# Deploys Blackbox Exporter.
#
# Simple explanation:
# Prometheus can scrape normal metrics directly.
# But for checking "is the Streamlit app reachable over HTTP?",
# Prometheus uses Blackbox Exporter.
#
# Blackbox Exporter sends a probe request to:
# http://streamlit-service:8501/_stcore/health
#
# It returns:
# probe_success = 1 if reachable
# probe_success = 0 if not reachable
#
# Grafana uses this for app health.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-config
  namespace: {{ .Values.namespace }}

data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_status_codes: []
          method: GET
          follow_redirects: true
          preferred_ip_protocol: ip4

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: blackbox-exporter

spec:
  replicas: 1

  selector:
    matchLabels:
      app: blackbox-exporter

  template:
    metadata:
      labels:
        app: blackbox-exporter

    spec:
      containers:
        - name: blackbox-exporter
          image: "{{ .Values.images.blackbox.repository }}:{{ .Values.images.blackbox.tag }}"
          imagePullPolicy: {{ .Values.images.blackbox.pullPolicy }}

          args:
            - --config.file=/etc/blackbox_exporter/config.yml

          ports:
            - containerPort: {{ .Values.ports.blackbox }}

          volumeMounts:
            - name: blackbox-config
              mountPath: /etc/blackbox_exporter/config.yml
              subPath: blackbox.yml

      volumes:
        - name: blackbox-config
          configMap:
            name: blackbox-config

---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter-service
  namespace: {{ .Values.namespace }}
  labels:
    app: blackbox-exporter

spec:
  type: ClusterIP

  selector:
    app: blackbox-exporter

  ports:
    - name: http
      port: {{ .Values.ports.blackbox }}
      targetPort: {{ .Values.ports.blackbox }}
