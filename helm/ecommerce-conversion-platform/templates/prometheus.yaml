# =============================================================================
# Prometheus ConfigMap + Deployment + Service
# =============================================================================
#
# What this file does:
# Deploys Prometheus and tells it what to scrape.
#
# Simple explanation:
# Prometheus is the monitoring database.
# It collects metrics from:
# - itself
# - the metrics exporter
# - Blackbox Exporter app health probe
#
# Grafana then reads data from Prometheus.
#
# Important:
# In Kubernetes, services provide stable DNS names:
# - metrics-exporter-service:8000
# - blackbox-exporter-service:9115
# - streamlit-service:8501
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: ecommerce_metrics_exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - metrics-exporter-service:8000

      - job_name: streamlit_app_health
        metrics_path: /probe
        params:
          module:
            - http_2xx
        static_configs:
          - targets:
              - http://streamlit-service:8501/_stcore/health
        relabel_configs:
          - source_labels:
              - __address__
            target_label: __param_target

          - source_labels:
              - __param_target
            target_label: instance

          - target_label: __address__
            replacement: blackbox-exporter-service:9115

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    app: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.images.prometheus.repository }}:{{ .Values.images.prometheus.tag }}"
          imagePullPolicy: {{ .Values.images.prometheus.pullPolicy }}

          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-lifecycle

          ports:
            - containerPort: {{ .Values.ports.prometheus }}

          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml

      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: {{ .Values.namespace }}
  labels:
    app: prometheus

spec:
  type: ClusterIP

  selector:
    app: prometheus

  ports:
    - name: http
      port: {{ .Values.ports.prometheus }}
      targetPort: {{ .Values.ports.prometheus }}
