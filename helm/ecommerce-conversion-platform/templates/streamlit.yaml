# =============================================================================
# Streamlit application Deployment + Service
# =============================================================================
#
# What this file does:
# Deploys the Streamlit BI application inside Kubernetes.
#
# Simple explanation:
# Deployment = tells Kubernetes how to run the app container.
# Service    = gives the app a stable network name inside Kubernetes.
#
# Business meaning:
# This is the user-facing BI / prediction application.
# It shows executive dashboards, prediction pages, model results,
# forecasts, anomaly insights, and MLOps architecture views.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-app
  namespace: {{ .Values.namespace }}
  labels:
    app: streamlit-app

spec:
  # One replica is enough for local demo.
  # In production, this could be increased for availability.
  replicas: 1

  selector:
    matchLabels:
      app: streamlit-app

  template:
    metadata:
      labels:
        app: streamlit-app

    spec:
      containers:
        - name: streamlit-app

          # Local Docker image built on this machine.
          image: "{{ .Values.images.streamlit.repository }}:{{ .Values.images.streamlit.tag }}"
          imagePullPolicy: {{ .Values.images.streamlit.pullPolicy }}

          # Start the Streamlit app.
          command:
            - python
            - -m
            - streamlit
            - run
            - app/Executive_Overview.py
            - --server.address=0.0.0.0
            - --server.port=8501

          ports:
            - containerPort: {{ .Values.ports.streamlit }}

          # Readiness probe:
          # Kubernetes uses this to decide whether the app is ready to receive traffic.
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: {{ .Values.ports.streamlit }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5

          # Liveness probe:
          # Kubernetes uses this to restart the container if the app becomes unhealthy.
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: {{ .Values.ports.streamlit }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10

          # Mount local project folders into the pod.
          # This avoids copying 1.7GB data into the Docker image.
          volumeMounts:
            - name: data
              mountPath: /app/data
              readOnly: true

            - name: reports
              mountPath: /app/reports
              readOnly: true

            - name: models
              mountPath: /app/models
              readOnly: true

            - name: monitoring
              mountPath: /app/monitoring

            - name: outputs
              mountPath: /app/outputs

            - name: logs
              mountPath: /app/logs

      volumes:
        # hostPath is used for local Docker Desktop Kubernetes demo.
        # Production deployments should use persistent volumes or external storage.
        - name: data
          hostPath:
            path: "{{ .Values.hostPathBase }}/data"
            type: Directory

        - name: reports
          hostPath:
            path: "{{ .Values.hostPathBase }}/reports"
            type: Directory

        - name: models
          hostPath:
            path: "{{ .Values.hostPathBase }}/models"
            type: Directory

        - name: monitoring
          hostPath:
            path: "{{ .Values.hostPathBase }}/monitoring"
            type: Directory

        - name: outputs
          hostPath:
            path: "{{ .Values.hostPathBase }}/outputs"
            type: DirectoryOrCreate

        - name: logs
          hostPath:
            path: "{{ .Values.hostPathBase }}/logs"
            type: DirectoryOrCreate

---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
  namespace: {{ .Values.namespace }}
  labels:
    app: streamlit-app

spec:
  type: ClusterIP

  selector:
    app: streamlit-app

  ports:
    - name: http
      port: {{ .Values.ports.streamlit }}
      targetPort: {{ .Values.ports.streamlit }}
