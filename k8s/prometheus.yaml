# =============================================================================
# Prometheus ConfigMap + Deployment + Service
# =============================================================================
#
# What this file does:
# Deploys Prometheus and tells it what to scrape.
#
# Simple explanation:
# Prometheus is the monitoring database.
# It collects metrics from:
# - itself
# - the metrics exporter
# - Blackbox Exporter app health probe
#
# Grafana then reads data from Prometheus.
#
# Important:
# In Kubernetes, services provide stable DNS names:
# - metrics-exporter-service:8000
# - blackbox-exporter-service:9115
# - streamlit-service:8501
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecommerce-mlops

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/alert_rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager-service:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: ecommerce_metrics_exporter
        metrics_path: /metrics
        static_configs:
          - targets:
              - metrics-exporter-service:8000

      - job_name: streamlit_app_health
        metrics_path: /probe
        params:
          module:
            - http_2xx
        static_configs:
          - targets:
              - http://streamlit-service:8501/_stcore/health
        relabel_configs:
          - source_labels:
              - __address__
            target_label: __param_target

          - source_labels:
              - __param_target
            target_label: instance

          - target_label: __address__
            replacement: blackbox-exporter-service:9115

  alert_rules.yml: |
    # =============================================================================
    # Prometheus alert rules
    # =============================================================================
    #
    # Purpose:
    # This file defines WHEN Prometheus should create alerts.
    #
    # Simple flow:
    # Prometheus watches metrics.
    # If a rule becomes true for long enough, Prometheus creates an alert.
    # Alertmanager receives that alert.
    # Grafana can also show that alert.
    #
    # Important:
    # This file only defines alert conditions.
    # It does not decide where alerts are sent.
    # That is handled by:
    # monitoring/alertmanager/alertmanager.yml
    # =============================================================================

    groups:
      # ---------------------------------------------------------------------------
      # Group 1: Platform and service health alerts
      # ---------------------------------------------------------------------------
      - name: ecommerce_platform_health
        rules:
          # Alert when the Streamlit app health endpoint is not reachable.
          #
          # probe_success comes from Blackbox Exporter.
          #
          # Meaning:
          # 1 = Streamlit app is reachable
          # 0 = Streamlit app is not reachable
          - alert: StreamlitAppDown
            expr: probe_success{job="streamlit_app_health"} == 0
            for: 2m
            labels:
              severity: critical
              component: streamlit
            annotations:
              summary: "Streamlit app is not responding"
              description: "The ecommerce Streamlit dashboard health endpoint is failing."

          # Alert when the metrics exporter is unavailable.
          #
          # ecommerce_metrics_exporter_up should be exposed by:
          # src/monitoring/metrics_exporter.py
          #
          # The absent(...) part means:
          # Alert also if the metric does not exist at all.
          - alert: MetricsExporterDown
            expr: ecommerce_metrics_exporter_up == 0 or absent(ecommerce_metrics_exporter_up)
            for: 2m
            labels:
              severity: critical
              component: metrics_exporter
            annotations:
              summary: "Metrics exporter is unavailable"
              description: "The ecommerce metrics exporter is not being scraped by Prometheus."

          # Alert when any Prometheus scrape target is down.
          #
          # up is a built-in Prometheus metric.
          #
          # Meaning:
          # 1 = target is reachable
          # 0 = target is down
          - alert: MonitoringTargetDown
            expr: up == 0
            for: 2m
            labels:
              severity: warning
              component: monitoring
            annotations:
              summary: "A monitoring target is down"
              description: "Prometheus target {{ $labels.job }} / {{ $labels.instance }} is down."

      # ---------------------------------------------------------------------------
      # Group 2: Business, model, and data-quality alerts
      # ---------------------------------------------------------------------------
      - name: ecommerce_business_and_model_monitoring
        rules:
          # Alert when more than 5% of logged predictions fail.
          #
          # clamp_min(..., 1) prevents division by zero when there are no predictions.
          - alert: PredictionErrorRateHigh
            expr: ecommerce_prediction_errors_total / clamp_min(ecommerce_predictions_total, 1) > 0.05
            for: 5m
            labels:
              severity: warning
              component: model_serving
            annotations:
              summary: "Prediction error rate is high"
              description: "More than 5% of logged prediction requests are failing."

          # Alert when model drift is detected.
          #
          # Note:
          # This metric only fires if the exporter or future drift job exposes:
          # ecommerce_model_drift_detected = 1
          - alert: ModelDriftDetected
            expr: ecommerce_model_drift_detected == 1
            for: 10m
            labels:
              severity: warning
              component: model_monitoring
            annotations:
              summary: "Model drift has been detected"
              description: "Visitor behaviour or prediction distribution has drifted."

          # Alert when missing value rate becomes too high.
          #
          # Threshold:
          # 0.02 = 2%
          - alert: MissingValueRateHigh
            expr: ecommerce_missing_value_rate > 0.02
            for: 10m
            labels:
              severity: warning
              component: data_quality
            annotations:
              summary: "Missing value rate is high"
              description: "Input data missing value rate is above 2%."

          # Alert when duplicate visitor rows exist.
          #
          # Expected data grain:
          # one row = one visitor
          - alert: DuplicateVisitorRowsDetected
            expr: ecommerce_duplicate_visitor_count > 0
            for: 10m
            labels:
              severity: warning
              component: data_quality
            annotations:
              summary: "Duplicate visitor rows detected"
              description: "The visitor feature table should keep one row per visitor."

          # Alert when anomaly rate is too high.
          #
          # Threshold:
          # 0.10 = 10%
          - alert: AnomalyRateHigh
            expr: ecommerce_anomaly_rate > 0.10
            for: 10m
            labels:
              severity: warning
              component: anomaly_monitoring
            annotations:
              summary: "Anomaly rate is high"
              description: "More than 10% of visitors are flagged as anomalous."

          # Alert when prediction scores are outside valid probability range.
          #
          # Valid prediction scores should be between:
          # 0 and 1
          - alert: InvalidPredictionScoresDetected
            expr: ecommerce_invalid_score_count > 0
            for: 5m
            labels:
              severity: warning
              component: model_serving
            annotations:
              summary: "Invalid prediction scores detected"
              description: "Prediction scores should stay between 0 and 1."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ecommerce-mlops
  labels:
    app: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: "prom/prometheus:v2.55.1"
          imagePullPolicy: IfNotPresent

          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.enable-lifecycle

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml

            - name: prometheus-config
              mountPath: /etc/prometheus/rules/alert_rules.yml
              subPath: alert_rules.yml

      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: ecommerce-mlops
  labels:
    app: prometheus

spec:
  type: ClusterIP

  selector:
    app: prometheus

  ports:
    - name: http
      port: 9090
      targetPort: 9090
