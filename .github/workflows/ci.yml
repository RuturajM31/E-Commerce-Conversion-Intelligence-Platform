name: CI - E-Commerce Conversion Intelligence Platform

# Run validation on every pushed branch and on pull requests to main.
# This workflow validates deployment assets but does not deploy production.
"on":
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-project:
    # This job checks the Python app, tests, Docker setup, and MLOps infrastructure files.
    name: Validate Code, Tests, Docker, and MLOps Infrastructure
    runs-on: ubuntu-latest

    env:
      GRAFANA_ADMIN_USER: ci-admin
      GRAFANA_ADMIN_PASSWORD: ci-configuration-only-password

    steps:
      # Step 1: Download the repository code into the GitHub Actions runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Install the same Python version used for this project.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-app.txt

      # Step 3: Install Helm so the CI pipeline can validate the Helm chart.
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.2"

      # Step 4: Install kubectl so the CI pipeline can validate Kubernetes YAML files.
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.27.2"

      # Step 5: Upgrade Python packaging tools before installing dependencies.
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      # Step 6: Install project dependencies from requirements.txt.
      - name: Install and validate dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip check
          python -m pip install --dry-run -r requirements-app.txt

      # Step 7: Check that the most important third-party libraries can be imported.
      - name: Validate core imports
        run: |
          python - <<'PY'
          import joblib
          import numpy
          import pandas
          import pyarrow
          import scipy
          import sklearn
          import streamlit
          import xgboost

          print("Core imports OK")
          PY

      # Step 8: Check that our own src package can be imported correctly.
      - name: Validate project imports
        run: |
          python -c "import src; print('src package import OK')"
          python -c "from src.config.paths import PROJECT_ROOT; print('Project root import OK:', PROJECT_ROOT)"

      # Step 9: Check that the important project folders and files exist.
      - name: Validate project structure
        run: |
          test -d app
          test -d src
          test -d tests
          test -d monitoring
          test -d helm
          test -d k8s
          test -f docker-compose.yml
          test -f Dockerfile
          test -f requirements.txt
          test -f README.md

      # Step 10: Compile Python files to catch syntax errors before running tests.
      - name: Validate Python and shell syntax
        run: |
          python -m compileall app src tests
          bash -n scripts/k8s_demo_start.sh
          bash -n scripts/k8s_demo_stop.sh

      # Step 11: Run the automated test suite.
      # This protects the project from broken logic entering GitHub.
      - name: Run automated tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -q -ra -p no:cacheprovider

      # Step 12: Build the Docker image.
      # This proves the Streamlit app and source code can be containerized.
      - name: Validate Docker build
        run: |
          docker build -t ecommerce-conversion-platform-ci .

      # Step 13: Validate docker-compose.yml.
      # Dockerfile checks one container.
      # Docker Compose checks the full local platform configuration.
      - name: Validate Docker Compose configuration
        run: |
          docker compose config > /tmp/ecommerce-compose-rendered.yaml
          test -s /tmp/ecommerce-compose-rendered.yaml

      # Step 14: Validate the Helm chart.
      # This checks whether the Kubernetes deployment package is structurally correct.
      - name: Validate Helm chart and rendered Kubernetes resources
        run: |
          helm lint helm/ecommerce-conversion-platform

          helm template             ecommerce-conversion-platform             helm/ecommerce-conversion-platform             --namespace ecommerce-mlops             > /tmp/ecommerce-helm-rendered.yaml

          test -s /tmp/ecommerce-helm-rendered.yaml

          kubectl apply             --dry-run=client             --validate=false             -f /tmp/ecommerce-helm-rendered.yaml             >/dev/null

          grep -q "grafana-admin-credentials"             /tmp/ecommerce-helm-rendered.yaml

          grep -q "alertmanager-service:9093"             /tmp/ecommerce-helm-rendered.yaml

          grep -q "alert-webhook-service"             /tmp/ecommerce-helm-rendered.yaml

      # Step 15: Validate Kubernetes YAML files without needing a live cluster.
      # This checks YAML readability and required Kubernetes keys:
      # apiVersion, kind, and metadata.
      # We avoid kubectl apply here because GitHub Actions has no Kubernetes API server.
      - name: Validate Kubernetes YAML syntax
        run: |
          python -m pip install pyyaml==6.0.2
          python - <<'PYAML'
          from pathlib import Path
          import yaml

          k8s_dir = Path("k8s")
          yaml_files = sorted(list(k8s_dir.glob("*.yaml")) + list(k8s_dir.glob("*.yml")))

          if not yaml_files:
              raise SystemExit("No Kubernetes YAML files found in k8s/.")

          for file_path in yaml_files:
              with file_path.open("r", encoding="utf-8") as file:
                  documents = list(yaml.safe_load_all(file))

              documents = [doc for doc in documents if doc is not None]

              if not documents:
                  raise SystemExit(f"No YAML documents found in {file_path}")

              for index, document in enumerate(documents, start=1):
                  missing = [
                      key for key in ["apiVersion", "kind", "metadata"]
                      if key not in document
                  ]

                  if missing:
                      raise SystemExit(
                          f"{file_path} document {index} is missing required Kubernetes keys: {missing}"
                      )

                  print(
                      f"Valid Kubernetes YAML: {file_path} "
                      f"document {index} -> {document['kind']}"
                  )

          print("All Kubernetes YAML files are readable and contain required Kubernetes keys.")
          PYAML

      # Step 16: Validate Prometheus configuration.
      # This checks whether prometheus.yml is readable and valid.
      - name: Validate Prometheus configuration
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus" \
            prom/prometheus:v2.55.1 \
            check config /etc/prometheus/prometheus.yml

      # Step 17: Validate Prometheus alert rules.
      # This checks whether alert rules are written correctly.
      - name: Validate Prometheus alert rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/monitoring/prometheus:/etc/prometheus" \
            prom/prometheus:v2.55.1 \
            check rules /etc/prometheus/alert_rules.yml

      # Step 18: Validate Alertmanager configuration.
      # This checks whether the alert notification configuration is valid.
      - name: Validate Alertmanager configuration
        run: |
          docker run --rm \
            --entrypoint amtool \
            -v "${{ github.workspace }}/monitoring/alertmanager:/etc/alertmanager" \
            prom/alertmanager:v0.27.0 \
            check-config /etc/alertmanager/alertmanager.yml

      # Step 19: Validate Grafana dashboard JSON files.
      # This confirms that dashboard files are valid JSON and not broken.
      - name: Validate Grafana dashboard JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          dashboard_dir = Path("monitoring/grafana/dashboards")
          dashboard_files = sorted(dashboard_dir.glob("*.json"))

          if not dashboard_files:
              raise SystemExit("No Grafana dashboard JSON files found.")

          for file_path in dashboard_files:
              with file_path.open("r", encoding="utf-8") as file:
                  json.load(file)
              print(f"Valid Grafana dashboard JSON: {file_path}")

          print("All Grafana dashboard JSON files are valid.")
          PY
