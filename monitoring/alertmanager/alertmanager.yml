# Alertmanager groups Prometheus alerts and sends them to the local
# project webhook receiver. Resolved alerts are also delivered.

global:
  resolve_timeout: 5m

route:
  receiver: local-webhook

  group_by:
    - alertname
    - component

  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://alert-webhook:5001/alerts
        send_resolved: true
